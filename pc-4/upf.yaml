logger:
  file:
    path: /var/log/open5gs/upf.log

global:
  max:
    ue: 1024

upf:
  pfcp:
    server:
      - address: 10.38.1.13 #127.0.0.7
    client:
#      smf:
 #       - address: #127.0.0.4   # SMF loopback

  gtpu:
    server:
      - address: 10.38.1.13 #127.0.0.7

  session:
    - subnet: 10.46.0.0/16
      gateway: 10.46.0.1
      dnn: mec.klu

  metrics:
    server:
      - address: 127.0.0.7
        port: 9090

